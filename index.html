<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forge — Workout Tracker</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Syne:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
      :root {
        --bg-base: #080808;
        --bg-surface: #0f0f0f;
        --bg-card: #141414;
        --bg-hover: #1a1a1a;
        --cherry: #c0152a;
        --cherry-dim: #7a0d1a;
        --cherry-glow: rgba(192, 21, 42, 0.1);
        --cherry-border: rgba(192, 21, 42, 0.3);
        --text-primary: #f0f0f0;
        --text-secondary: #666;
        --text-muted: #333;
        --border: rgba(255, 255, 255, 0.06);
        --border-hover: rgba(255, 255, 255, 0.12);
        --success: #1a6b3a;
        --success-bg: rgba(26, 107, 58, 0.12);
        --success-border: rgba(26, 107, 58, 0.25);
        --radius: 6px;
        --radius-lg: 12px;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: var(--bg-base);
        color: var(--text-primary);
        font-family: "Space Grotesk", sans-serif;
        font-weight: 300;
        font-size: 14px;
        line-height: 1.6;
        min-height: 100vh;
      }

      /* ── LAYOUT ── */
      .app {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(8, 8, 8, 0.95);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
        padding: 0 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 56px;
      }
      .logo {
        font-family: "Syne", sans-serif;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-primary);
      }
      .logo span {
        color: var(--cherry);
      }
      nav {
        display: flex;
        gap: 2px;
      }
      .nav-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-family: "Space Grotesk", sans-serif;
        font-size: 11px;
        font-weight: 500;
        color: var(--text-secondary);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 6px 14px;
        border-radius: var(--radius);
        transition: all 0.2s;
      }
      .nav-btn:hover {
        color: var(--text-primary);
        background: var(--bg-hover);
      }
      .nav-btn.active {
        color: var(--cherry);
        background: var(--cherry-glow);
      }

      main {
        flex: 1;
        padding: 36px 32px;
        max-width: 860px;
        margin: 0 auto;
        width: 100%;
      }

      /* ── PAGES ── */
      .page {
        display: none;
      }
      .page.active {
        display: block;
      }

      .page-title {
        font-family: "Syne", sans-serif;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-primary);
        margin-bottom: 4px;
      }
      .page-sub {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 28px;
        letter-spacing: 0.02em;
      }

      /* ── NEXT BANNER ── */
      .next-banner {
        background: var(--cherry-glow);
        border: 1px solid var(--cherry-border);
        border-radius: var(--radius-lg);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 24px;
      }
      .next-banner-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--cherry);
        flex-shrink: 0;
      }
      .next-banner-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--cherry-dim);
      }
      .next-banner-name {
        font-family: "Syne", sans-serif;
        font-size: 14px;
        font-weight: 600;
        color: var(--cherry);
        letter-spacing: 0.04em;
      }

      /* ── DAY CARDS ── */
      .days-grid {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .day-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        transition: border-color 0.2s;
      }
      .day-card:hover {
        border-color: var(--border-hover);
      }
      .day-card.completed {
        border-color: var(--success-border);
      }
      .day-card.in-progress {
        border-color: rgba(192, 21, 42, 0.2);
      }

      .day-header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 16px 20px;
        cursor: pointer;
        user-select: none;
      }
      .day-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--text-muted);
        flex-shrink: 0;
        transition: background 0.3s;
      }
      .day-card.completed .day-dot {
        background: var(--success);
      }
      .day-card.in-progress .day-dot {
        background: var(--cherry);
      }

      .day-name {
        font-family: "Syne", sans-serif;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .day-label {
        font-size: 11px;
        color: var(--text-secondary);
        letter-spacing: 0.02em;
        margin-top: 1px;
      }

      .day-progress-wrap {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .day-progress-text {
        font-size: 11px;
        color: var(--text-secondary);
        font-variant-numeric: tabular-nums;
      }
      .progress-bar-sm {
        width: 72px;
        height: 2px;
        background: var(--bg-hover);
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        background: var(--cherry);
        border-radius: 2px;
        transition: width 0.4s ease;
      }
      .day-card.completed .progress-bar-fill {
        background: var(--success);
      }
      .chevron {
        font-size: 10px;
        color: var(--text-muted);
        transition: transform 0.25s;
        margin-left: 6px;
      }
      .day-card.open .chevron {
        transform: rotate(180deg);
      }

      /* ── EXERCISE LIST ── */
      .exo-body {
        display: none;
        padding: 0 20px 18px;
      }
      .day-card.open .exo-body {
        display: block;
      }
      .exo-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .exo-row {
        display: grid;
        grid-template-columns: 22px 1fr auto auto;
        align-items: center;
        gap: 12px;
        padding: 11px 14px;
        background: var(--bg-surface);
        border-radius: var(--radius);
        border: 1px solid transparent;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      .exo-row:hover {
        border-color: var(--border);
        background: var(--bg-hover);
      }
      .exo-row.done {
        background: var(--success-bg);
        border-color: var(--success-border);
      }

      .exo-check {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        border: 1px solid var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.2s;
        font-size: 10px;
        color: transparent;
      }
      .exo-row.done .exo-check {
        background: var(--success);
        border-color: var(--success);
        color: #fff;
      }

      .exo-name {
        font-size: 13px;
        font-weight: 400;
        color: var(--text-primary);
      }
      .exo-muscle {
        font-size: 11px;
        color: var(--text-secondary);
        margin-top: 1px;
      }
      .exo-sets {
        font-size: 11px;
        color: var(--text-secondary);
        background: var(--bg-card);
        padding: 3px 9px;
        border-radius: 20px;
        white-space: nowrap;
        border: 1px solid var(--border);
      }
      .exo-rest {
        font-size: 11px;
        color: var(--text-muted);
        white-space: nowrap;
      }

      /* ── ACTIONS ── */
      .session-actions {
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }
      .btn-primary {
        padding: 9px 20px;
        border-radius: var(--radius);
        background: var(--cherry);
        border: none;
        cursor: pointer;
        font-family: "Space Grotesk", sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: #fff;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        transition: opacity 0.2s;
      }
      .btn-primary:hover {
        opacity: 0.85;
      }
      .btn-ghost {
        padding: 9px 20px;
        border-radius: var(--radius);
        background: none;
        border: 1px solid var(--border);
        cursor: pointer;
        font-family: "Space Grotesk", sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-secondary);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        transition: all 0.2s;
      }
      .btn-ghost:hover {
        border-color: var(--border-hover);
        color: var(--text-primary);
      }

      /* ── HISTORY ── */
      .history-empty {
        text-align: center;
        padding: 80px 0;
        color: var(--text-muted);
        font-size: 13px;
      }
      .history-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .history-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 18px 20px;
      }
      .history-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .history-day-name {
        font-family: "Syne", sans-serif;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .history-date {
        font-size: 11px;
        color: var(--text-secondary);
      }
      .history-exos {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .history-tag {
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 20px;
        background: var(--bg-hover);
        color: var(--text-secondary);
        border: 1px solid var(--border);
      }
      .history-tag.done-tag {
        background: var(--success-bg);
        color: #4caf70;
        border-color: var(--success-border);
      }

      /* ── MODAL (email setup) ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 200;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal-overlay.hidden {
        display: none;
      }
      .modal {
        background: var(--bg-card);
        border: 1px solid var(--cherry-border);
        border-radius: var(--radius-lg);
        padding: 36px 32px;
        max-width: 420px;
        width: 100%;
      }
      .modal-title {
        font-family: "Syne", sans-serif;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-primary);
        margin-bottom: 6px;
      }
      .modal-sub {
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 28px;
        line-height: 1.6;
      }
      .modal-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--text-secondary);
        display: block;
        margin-bottom: 8px;
      }
      .modal-input {
        width: 100%;
        padding: 11px 14px;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text-primary);
        font-family: "Space Grotesk", sans-serif;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
        margin-bottom: 20px;
      }
      .modal-input:focus {
        border-color: var(--cherry-border);
      }
      .modal-input::placeholder {
        color: var(--text-muted);
      }
      .modal-btn {
        width: 100%;
        padding: 12px;
        background: var(--cherry);
        border: none;
        cursor: pointer;
        border-radius: var(--radius);
        font-family: "Space Grotesk", sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: #fff;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        transition: opacity 0.2s;
      }
      .modal-btn:hover {
        opacity: 0.85;
      }

      /* ── TOAST ── */
      #toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(16px);
        background: var(--bg-card);
        border: 1px solid var(--border-hover);
        color: var(--text-primary);
        font-size: 12px;
        letter-spacing: 0.04em;
        padding: 11px 20px;
        border-radius: var(--radius);
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s;
        z-index: 999;
        white-space: nowrap;
      }
      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      @media (max-width: 600px) {
        header {
          padding: 0 16px;
        }
        main {
          padding: 24px 16px;
        }
        .exo-row {
          grid-template-columns: 22px 1fr auto;
        }
        .exo-rest {
          display: none;
        }
        .progress-bar-sm {
          width: 48px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- EMAIL MODAL -->
      <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
          <div class="modal-title">
            Welcome<span style="color: var(--cherry)">.</span>
          </div>
          <p class="modal-sub">
            Enter your email to receive workout summaries and accountability
            reports after each session.
          </p>
          <label class="modal-label">Your email</label>
          <input
            class="modal-input"
            type="email"
            id="modal-email"
            placeholder="you@example.com"
          />
          <button class="modal-btn" onclick="saveEmail()">Let's go</button>
        </div>
      </div>

      <header>
        <div class="logo">Forge<span>.</span></div>
        <nav>
          <button class="nav-btn active" onclick="showPage('plan', event)">
            Plan
          </button>
          <button class="nav-btn" onclick="showPage('history', event)">
            History
          </button>
          <button class="nav-btn" onclick="showPage('settings', event)">
            Settings
          </button>
        </nav>
      </header>

      <main>
        <!-- PLAN -->
        <div id="page-plan" class="page active">
          <h1 class="page-title">Weekly Plan</h1>
          <p class="page-sub">
            Tap an exercise to mark it done. Send summary anytime.
          </p>
          <div id="next-banner" class="next-banner" style="display: none">
            <div class="next-banner-dot"></div>
            <div>
              <div class="next-banner-label">Next session</div>
              <div class="next-banner-name" id="next-banner-name"></div>
            </div>
          </div>
          <div class="days-grid" id="days-grid"></div>
        </div>

        <!-- HISTORY -->
        <div id="page-history" class="page">
          <h1 class="page-title">History</h1>
          <p class="page-sub">All completed and partial sessions.</p>
          <div id="history-list"></div>
        </div>

        <!-- SETTINGS -->
        <div id="page-settings" class="page">
          <h1 class="page-title">Settings</h1>
          <p class="page-sub">Manage your profile.</p>
          <div
            style="
              background: var(--bg-card);
              border: 1px solid var(--border);
              border-radius: var(--radius-lg);
              padding: 24px;
            "
          >
            <label class="modal-label">Your email</label>
            <input
              class="modal-input"
              type="email"
              id="settings-email"
              placeholder="you@example.com"
            />
            <button class="btn-primary" onclick="updateEmail()">Save</button>
          </div>
        </div>
      </main>
    </div>

    <div id="toast"></div>

            },
            {
              name: "Hip thrust (Smith machine)",
              muscle: "Glutes, isolation",
              sets: "4 × 10–12",
              rest: "90 s",
            },
            {
              name: "Leg extension machine",
              muscle: "Quads (isolation)",
              sets: "3 × 12–15",
              rest: "90 s",
            },
            {
              name: "Lying leg curl machine",
              muscle: "Hamstrings",
              sets: "3 × 12–15",
              rest: "90 s",
            },
            {
              name: "Cable crunch kneeling",
              muscle: "Abs",
              sets: "3 × 15–20",
              rest: "60 s",
            },
            {
              name: "Rotary torso machine (each side)",
              muscle: "Obliques",
              sets: "3 × 15",
              rest: "60 s",
            },
            {
              name: "Abdominal crunch machine",
              muscle: "Abs, isolation",
              sets: "3 × 20",
              rest: "60 s",
            },
          ],
        },
      ];

      const ORDER = ["monday", "tuesday", "wednesday", "thursday", "friday"];

      // ── EMAIL STORAGE ─────────────────────────────────────────────────
      function getUserEmail() {
        return localStorage.getItem("wt_user_email") || "";
      }
      function setUserEmail(e) {
        localStorage.setItem("wt_user_email", e);
      }

      function saveEmail() {
        const val = document.getElementById("modal-email").value.trim();
        if (!val || !val.includes("@")) {
          toast("Please enter a valid email.");
          return;
        }
        setUserEmail(val);
        document.getElementById("modal-overlay").classList.add("hidden");
        toast("Email saved — you're all set.");
      }

      function updateEmail() {
        const val = document.getElementById("settings-email").value.trim();
        if (!val || !val.includes("@")) {
          toast("Please enter a valid email.");
          return;
        }
        setUserEmail(val);
        toast("Email updated.");
      }

      function checkModal() {
        if (!getUserEmail()) {
          document.getElementById("modal-overlay").classList.remove("hidden");
        } else {
          document.getElementById("modal-overlay").classList.add("hidden");
        }
      }

      // ── STATE ─────────────────────────────────────────────────────────
      function todayKey() {
        return new Date().toISOString().slice(0, 10);
      }
      function stateKey(dayId) {
        return `wt_${dayId}_${todayKey()}`;
      }
      function loadState(dayId) {
        try {
          return JSON.parse(localStorage.getItem(stateKey(dayId))) || {};
        } catch {
          return {};
        }
      }
      function saveState(dayId, state) {
        localStorage.setItem(stateKey(dayId), JSON.stringify(state));
      }
      function loadHistory() {
        try {
          return JSON.parse(localStorage.getItem("wt_history")) || [];
        } catch {
          return [];
        }
      }
      function saveHistory(h) {
        localStorage.setItem("wt_history", JSON.stringify(h));
      }

      // ── RENDER ────────────────────────────────────────────────────────
      function render() {
        const grid = document.getElementById("days-grid");
        grid.innerHTML = "";
        DAYS.forEach((day) => {
          const state = loadState(day.id);
          const total = day.exercises.length;
          const done = day.exercises.filter((_, i) => state[i]).length;
          const completed = done === total;
          const inProgress = done > 0 && !completed;

          const card = document.createElement("div");
          card.className =
            "day-card" +
            (completed ? " completed" : inProgress ? " in-progress" : "");
          card.innerHTML = `
      <div class="day-header" onclick="toggleDay('${day.id}')">
        <div class="day-dot"></div>
        <div>
          <div class="day-name">${day.name} <span style="font-size:11px;font-family:'Space Grotesk';font-weight:300;color:var(--text-secondary);text-transform:none;letter-spacing:0">${day.label}</span></div>
          <div class="day-label">${day.subtitle} · ${day.duration}</div>
        </div>
        <div class="day-progress-wrap">
          <span class="day-progress-text">${done}/${total}</span>
          <div class="progress-bar-sm"><div class="progress-bar-fill" style="width:${Math.round((done / total) * 100)}%"></div></div>
          <span class="chevron">▾</span>
        </div>
      </div>
      <div class="exo-body">
        <div class="exo-list" id="exo-${day.id}"></div>
        <div class="session-actions" id="actions-${day.id}"></div>
      </div>
    `;
          grid.appendChild(card);

          const list = document.getElementById(`exo-${day.id}`);
          day.exercises.forEach((ex, i) => {
            const isDone = !!state[i];
            const row = document.createElement("div");
            row.className = "exo-row" + (isDone ? " done" : "");
            row.innerHTML = `
        <div class="exo-check">${isDone ? "✓" : ""}</div>
        <div><div class="exo-name">${ex.name}</div><div class="exo-muscle">${ex.muscle}</div></div>
        <div class="exo-sets">${ex.sets}</div>
        <div class="exo-rest">${ex.rest}</div>
      `;
            row.onclick = () => toggleExercise(day.id, i);
            list.appendChild(row);
          });

          const actions = document.getElementById(`actions-${day.id}`);
          if (completed) {
            actions.innerHTML = `
        <button class="btn-ghost" onclick="resetDay('${day.id}', event)">Reset</button>
        <button class="btn-primary" onclick="finishSession('${day.id}', event)">Send summary ✉</button>`;
          } else if (inProgress) {
            actions.innerHTML = `
        <button class="btn-ghost" onclick="resetDay('${day.id}', event)">Reset</button>
        <button class="btn-primary" onclick="finishSession('${day.id}', event)">Send summary ✉</button>`;
          }
        });
        renderNextBanner();
      }

      function toggleDay(dayId) {
        document.querySelectorAll(".day-card").forEach((c) => {
          const h = c.querySelector(".day-header");
          if (h && h.getAttribute("onclick") === `toggleDay('${dayId}')`) {
            c.classList.toggle("open");
          } else {
            c.classList.remove("open");
          }
        });
      }

      function toggleExercise(dayId, index) {
        const state = loadState(dayId);
        state[index] = !state[index];
        saveState(dayId, state);
        render();
        document.querySelectorAll(".day-card").forEach((c) => {
          const h = c.querySelector(".day-header");
          if (h && h.getAttribute("onclick") === `toggleDay('${dayId}')`)
            c.classList.add("open");
        });
      }

      function resetDay(dayId, e) {
        e.stopPropagation();
        localStorage.removeItem(stateKey(dayId));
        render();
      }

      // ── NEXT BANNER ───────────────────────────────────────────────────
      function renderNextBanner() {
        const banner = document.getElementById("next-banner");
        const todayDow = new Date().getDay();
        const dowMap = {
          monday: 1,
          tuesday: 2,
          wednesday: 3,
          thursday: 4,
          friday: 5,
          saturday: 6,
        };
        let next = null;
        for (const d of ORDER) {
          const state = loadState(d);
          const done = DAYS.find((x) => x.id === d).exercises.filter(
            (_, j) => state[j],
          ).length;
          const total = DAYS.find((x) => x.id === d).exercises.length;
          if (done < total && (dowMap[d] || 7) >= todayDow) {
            next = d;
            break;
          }
        }
        if (!next) {
          for (const d of ORDER) {
            const state = loadState(d);
            const done = DAYS.find((x) => x.id === d).exercises.filter(
              (_, j) => state[j],
            ).length;
            const total = DAYS.find((x) => x.id === d).exercises.length;
            if (done < total) {
              next = d;
              break;
            }
          }
        }
        if (next) {
          const day = DAYS.find((x) => x.id === next);
          document.getElementById("next-banner-name").textContent =
            `${day.name} — ${day.subtitle}`;
          banner.style.display = "flex";
        } else {
          banner.style.display = "none";
        }
      }

      // ── FINISH SESSION ────────────────────────────────────────────────
      function finishSession(dayId, e) {
        e.stopPropagation();
        const day = DAYS.find((d) => d.id === dayId);
        const state = loadState(dayId);
        const total = day.exercises.length;
        const done = day.exercises.filter((_, i) => state[i]).length;
        const completed = done === total;

        const userEmail = getUserEmail();
        if (!userEmail) {
          toast("No email set — go to Settings.");
          return;
        }

        const today = new Date().toLocaleDateString("en-GB", {
          weekday: "long",
          day: "numeric",
          month: "long",
          year: "numeric",
        });
        const doneExos = day.exercises
          .filter((_, i) => state[i])
          .map((ex) => `• ${ex.name} — ${ex.sets}`)
          .join("\n");
        const leftExos = day.exercises
          .filter((_, i) => !state[i])
          .map((ex) => `• ${ex.name}`)
          .join("\n");

        const nextIdx = (ORDER.indexOf(dayId) + 1) % ORDER.length;
        const nextDay = DAYS.find((d) => d.id === ORDER[nextIdx]);
        const nextLine = `${nextDay.name} — ${nextDay.subtitle}`;

        if (EMAILJS_PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
          toast("EmailJS not configured — add your credentials.");
          saveToHistory(dayId, day, state);
          return;
        }

        emailjs.init(EMAILJS_PUBLIC_KEY);
        const templateId = completed
          ? EMAILJS_TEMPLATE_ID
          : EMAILJS_SHAME_TEMPLATE_ID;
        emailjs
          .send(EMAILJS_SERVICE_ID, templateId, {
            to_email: userEmail,
            day_name: `${day.name} · ${day.subtitle}`,
            session_date: today,
            exercises_done: doneExos || "—",
            exercises_left: leftExos || "—",
            next_session: nextLine,
          })
          .then(() => {
            toast(
              completed ? "Summary sent ✓" : "Shame report sent. Go finish it.",
            );
            saveToHistory(dayId, day, state);
          })
          .catch(() => {
            toast("Email failed — check your EmailJS config.");
          });
      }

      function saveToHistory(dayId, day, state) {
        const history = loadHistory();
        history.unshift({
          dayId,
          dayName: day.name,
          subtitle: day.subtitle,
          date: new Date().toISOString(),
          exercises: day.exercises.map((ex, i) => ({
            name: ex.name,
            done: !!state[i],
          })),
        });
        saveHistory(history);
      }

      // ── HISTORY PAGE ──────────────────────────────────────────────────
      function renderHistory() {
        const container = document.getElementById("history-list");
        const history = loadHistory();
        if (!history.length) {
          container.innerHTML = `<div class="history-empty">No sessions yet.</div>`;
          return;
        }
        container.innerHTML = "";
        history.forEach((h) => {
          const d = new Date(h.date);
          const dateStr = d.toLocaleDateString("en-GB", {
            weekday: "short",
            day: "numeric",
            month: "short",
            year: "numeric",
          });
          const card = document.createElement("div");
          card.className = "history-card";
          const tags = h.exercises
            .map(
              (ex) =>
                `<span class="history-tag ${ex.done ? "done-tag" : ""}">${ex.name}</span>`,
            )
            .join("");
          card.innerHTML = `
      <div class="history-top">
        <div class="history-day-name">${h.dayName} <span style="font-size:11px;font-family:'Space Grotesk';font-weight:300;color:var(--text-secondary);text-transform:none;letter-spacing:0">${h.subtitle}</span></div>
        <div class="history-date">${dateStr}</div>
      </div>
      <div class="history-exos">${tags}</div>
    `;
          container.appendChild(card);
        });
      }

      // ── SETTINGS PAGE ─────────────────────────────────────────────────
      function renderSettings() {
        const input = document.getElementById("settings-email");
        if (input) input.value = getUserEmail();
      }

      // ── NAV ───────────────────────────────────────────────────────────
      function showPage(name, event) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));
        document
          .querySelectorAll(".nav-btn")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById(`page-${name}`).classList.add("active");
        if (event && event.target) event.target.classList.add("active");
        if (name === "history") renderHistory();
        if (name === "settings") renderSettings();
      }

      // ── TOAST ─────────────────────────────────────────────────────────
      function toast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3200);
      }

      // ── INIT ──────────────────────────────────────────────────────────
      checkModal();
      render();
    </script>
  </body>
</html>
